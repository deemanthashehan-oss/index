<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dee Academy | Cone Volume Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .logo {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 5px;
        }
        .tagline {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            font-size: 24px;
        }
        .method-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .method-btn {
            flex: 1;
            padding: 12px;
            background: #e0e0e0;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .method-btn.active {
            background: #667eea;
            color: white;
        }
        .panel {
            display: none;
        }
        .panel.active {
            display: block;
        }
        .input-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #555;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 15px 0;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .result {
            background: #f0fdf4;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            text-align: center;
        }
        .volume {
            font-size: 24px;
            font-weight: bold;
            color: #166534;
            margin-top: 10px;
        }
        .formula {
            text-align: center;
            font-size: 12px;
            color: #888;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }
        footer {
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.8);
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="logo">π DEE ACADEMY</div>
        <div class="tagline">📐 Learn mathematics with Dee Academy ✨</div>
        
        <h1>🧮 Cone Volume Calculator</h1>
        
        <div class="method-buttons">
            <button class="method-btn active" onclick="showPanel('rh')">📏 Radius + Height</button>
            <button class="method-btn" onclick="showPanel('slant')">📐 Radius + Slant Height</button>
        </div>
        
        <!-- Method 1: Radius + Perpendicular Height -->
        <div id="panelRh" class="panel active">
            <div class="input-group">
                <label>📌 Radius (r):</label>
                <input type="number" id="radius1" value="5" step="0.1">
            </div>
            <div class="input-group">
                <label>📏 Perpendicular Height (h):</label>
                <input type="number" id="height1" value="12" step="0.1">
            </div>
            <div class="input-group">
                <label>📦 Unit:</label>
                <select id="unit1">
                    <option value="cm³">cm³</option>
                    <option value="m³">m³</option>
                </select>
            </div>
            <button onclick="calcMethod1()">Calculate Volume</button>
            <div class="result">
                <div>📦 Volume:</div>
                <div class="volume" id="vol1">---</div>
            </div>
        </div>
        
        <!-- Method 2: Radius + Slant Height -->
        <div id="panelSlant" class="panel">
            <div class="input-group">
                <label>📌 Radius (r):</label>
                <input type="number" id="radius2" value="5" step="0.1">
            </div>
            <div class="input-group">
                <label>📐 Slant Height (L):</label>
                <input type="number" id="slant2" value="13" step="0.1">
            </div>
            <div class="input-group">
                <label>📦 Unit:</label>
                <select id="unit2">
                    <option value="cm³">cm³</option>
                    <option value="m³">m³</option>
                </select>
            </div>
            <button onclick="calcMethod2()">Calculate Volume</button>
            <div class="result">
                <div>📐 Perpendicular Height:</div>
                <div class="volume" id="computedH" style="font-size: 18px;">---</div>
                <div style="margin-top: 15px;">📦 Volume:</div>
                <div class="volume" id="vol2">---</div>
            </div>
        </div>
        
        <div class="formula">
            📐 Formula: V = ⅓ × π × r² × h
        </div>
    </div>
    <footer>Dee Academy | Cone Volume Calculator</footer>
</div>

<script>
    function showPanel(panel) {
        const panelRh = document.getElementById('panelRh');
        const panelSlant = document.getElementById('panelSlant');
        const btns = document.querySelectorAll('.method-btn');
        
        if (panel === 'rh') {
            panelRh.classList.add('active');
            panelSlant.classList.remove('active');
            btns[0].classList.add('active');
            btns[1].classList.remove('active');
        } else {
            panelRh.classList.remove('active');
            panelSlant.classList.add('active');
            btns[0].classList.remove('active');
            btns[1].classList.add('active');
        }
    }
    
    function calcMethod1() {
        let r = parseFloat(document.getElementById('radius1').value);
        let h = parseFloat(document.getElementById('height1').value);
        let unit = document.getElementById('unit1').value;
        
        if (isNaN(r)) r = 0;
        if (isNaN(h)) h = 0;
        if (r < 0) r = 0;
        if (h < 0) h = 0;
        
        let volume = (1/3) * Math.PI * r * r * h;
        document.getElementById('vol1').innerHTML = volume.toFixed(4) + ' ' + unit;
    }
    
    function calcMethod2() {
        let r = parseFloat(document.getElementById('radius2').value);
        let L = parseFloat(document.getElementById('slant2').value);
        let unit = document.getElementById('unit2').value;
        
        if (isNaN(r)) r = 0;
        if (isNaN(L)) L = 0;
        if (r < 0) r = 0;
        if (L < 0) L = 0;
        
        if (L < r) {
            document.getElementById('computedH').innerHTML = 'Error: L must be ≥ r';
            document.getElementById('vol2').innerHTML = 'Invalid';
            return;
        }
        
        let h = Math.sqrt(L * L - r * r);
        let volume = (1/3) * Math.PI * r * r * h;
        
        document.getElementById('computedH').innerHTML = h.toFixed(4) + ' ' + unit;
        document.getElementById('vol2').innerHTML = volume.toFixed(4) + ' ' + unit;
    }
</script>
</body>
</html>
